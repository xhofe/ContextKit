name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-latest
    env:
      HOMEBREW_NO_AUTO_UPDATE: 1
      DISTRIBUTION_CODE_SIGNING_ALLOWED: NO
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install XcodeGen
        run: |
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi

      - name: Install GitHub CLI
        run: |
          if ! command -v gh >/dev/null 2>&1; then
            brew install gh
          fi

      - name: Test ContextKitCore
        run: swift test --package-path Packages/ContextKitCore

      - name: Test ContextKitBuiltins
        run: swift test --package-path Packages/ContextKitBuiltins

      - name: Test ContextKitPluginSDK
        run: swift test --package-path Packages/ContextKitPluginSDK

      - name: Build distribution artifacts
        run: ./Support/Scripts/build-distribution.sh

      - name: Upload release workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: contextkit-${{ github.ref_name }}
          path: |
            dist/ContextKit.dmg
            dist/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" \
              dist/ContextKit.dmg \
              dist/SHA256SUMS.txt \
              --clobber
          else
            gh release create "${GITHUB_REF_NAME}" \
              dist/ContextKit.dmg \
              dist/SHA256SUMS.txt \
              --title "${GITHUB_REF_NAME}" \
              --generate-notes
          fi
